<!DOCTYPE html>
<html>
<head>
  <title>License Admin</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h2 { margin-bottom: 10px; }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border: 1px solid #333;
      text-align: center;
    }

    .revoked { color: red; }
    .active { color: lightgreen; }
    .expired { color: orange; }
  </style>
</head>

<body>

<h2>🔑 License Dashboard</h2>

<div>
  <button onclick="generate(30)">Generate 30 Days</button>
  <button onclick="generate(90)">Generate 90 Days</button>
  <button onclick="generate(3650)">Lifetime</button>
</div>

<h3 id="newKey"></h3>

<table>
  <thead>
    <tr>
      <th>Key</th>
      <th>Device</th>
      <th>Status</th>
      <th>Expiry</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>

const baseUrl = "https://cdr-license-server.onrender.com"; // your URL
const ADMIN_KEY = "ZOORAVAR_SECURE_786";

/// 🔑 Generate License
async function generate(days) {

  const res = await fetch(`${baseUrl}/generate?days=${days}`, {
    headers: { "admin-key": ADMIN_KEY }
  });

  const data = await res.json();

  document.getElementById("newKey").innerText =
    "New Key: " + data.key;

  loadLicenses();
}

/// 📋 Load Licenses (FROM FIREBASE)
async function loadLicenses() {

  const res = await fetch(`${baseUrl}/licenses`, {
    headers: { "admin-key": ADMIN_KEY }
  });

  const data = await res.json();

  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  data.forEach(l => {

    let statusClass = "active";

    if (l.status === "revoked") statusClass = "revoked";
    if (new Date() > new Date(l.expiry._seconds * 1000)) {
      statusClass = "expired";
    }

    const expiryDate = l.expiry._seconds
      ? new Date(l.expiry._seconds * 1000)
      : new Date(l.expiry);

    const row = `
      <tr>
        <td>${l.key}</td>
        <td>${l.device_id || "-"}</td>
        <td class="${statusClass}">${l.status}</td>
        <td>${expiryDate.toLocaleDateString()}</td>
        <td>
          <button onclick="revoke('${l.key}')">Revoke</button>
        </td>
      </tr>
    `;

    body.innerHTML += row;
  });
}

/// ❌ Revoke
async function revoke(key) {

  await fetch(`${baseUrl}/revoke`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "admin-key": ADMIN_KEY
    },
    body: JSON.stringify({ key })
  });

  loadLicenses();
}

/// 🔄 Auto refresh every 5 sec
setInterval(loadLicenses, 5000);

loadLicenses();

</script>

</body>
</html>
